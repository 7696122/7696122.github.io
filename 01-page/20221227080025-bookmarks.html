<script>
const activeClassName = 'highlight';
const path = (href) => new URL(href).pathname;
const dir = (href) => {
  let _pathname = path(href);
  return _pathname.substring(0, _pathname.lastIndexOf('/') + 1);
}

const active = (el) => el.parentNode.classList.add(activeClassName);

const homeA = document.querySelector("body > header > div.navigation-panel > nav > ul > li:nth-child(1) > a");
let homePathname = dir(homeA.href);
const pageA = document.querySelector("body > header > div.navigation-panel > nav > ul > li:nth-child(2) > a");
let pagePathname = dir(pageA.href);
const aboutA = document.querySelector("body > header > div.navigation-panel > nav > ul > li:nth-child(3) > a")
let aboutPathname = dir(aboutA.href);

switch(dir(window.location.href)) {
  // case '/':
  case homePathname:
    active(homeA);
    break;
  case pagePathname:
    active(pageA);
    break;
  case aboutPathname:
    active(aboutA);
    break;
}
</script>
